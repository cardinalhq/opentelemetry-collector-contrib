awsfirehose:
  endpoint: 0.0.0.0:4433
  access_key: "some_access_key"
  tls:
    cert_file: server.crt
    key_file: server.key
  metrics:
    - path: /metrics
      record_type: cwmetrics
      name_prefixes:
        - attribute_name: alice
          default: "alice"
        - attribute_name: bob
          default: "bob"
  logs:
    - path: /logs
      record_type: cwlogs
